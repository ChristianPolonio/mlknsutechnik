<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
      color: #222;
    }

    h1, h2, h3 {
      font-weight: 600;
      margin-top: 2rem;
    }

    pre, code {
      background: #f4f4f4;
      padding: .2rem .4rem;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    pre {
      padding: 1rem;
      overflow-x: auto;
    }

    a {
      color: #0366d6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
